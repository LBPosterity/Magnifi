<!DOCTYPE html>
<html lang="en">
  <title></title>
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>   


<style>
    @import url("styles.css");

    html
    {
        margin: 4rem;
    }


    .profit-loss-wrapper
    {
        display: flex;
        flex-direction: row;
        gap: 16px;
    }

    .table-wrapper
    {
        display: flex;
        flex-direction: column;
        gap: 16px;
        flex-grow: 1;
    }

    .table-header
    {
        display: flex;
        flex-direction: row;
        justify-content: flex-start;
        align-items: center;
        gap: 16px;
        padding: 8px 16px;
        margin-top: 4px;
        min-height: 48px;
        border-radius: 8px;
        background-color: var(--bg-light-green);

        & .title
        {
            flex: 1;
        }
    }

    .stepper-wrapper
    {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        min-height: 300px;
    }

    .step-selector
    {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 2px solid var(--border);
        background: white;
        --size: 54px;
        width: var(--size);
        height: var(--size);
        cursor: pointer;

        & i
        {
            color: var(--text-light);
        }
    }

    .step-line
    {
        flex-grow: 1;
        position: relative;

        &::after
        {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            height: 100%;
            width: 0px;
            background: transparent;
            border-radius: 999px;
            border: 0px dotted var(--border);
            border-width: 0px 0px 0px 3px;
            z-index: -1;
             transition: all 0.3s ease-in-out;
        }
    }



    .step-selector:hover
        {
            border-color: var(--border-dark);
        }
        .step-selector:hover ~ .step-line::after
        {
            border-color: var(--border-dark);
        }
    

    .stepper-wrapper.active
    {
        & .step-selector
        {
            background: var(--bg-light-green);
            border-color: transparent;
        }
        & .step-line::after
        {
            border-color: var(--bg-light-green);
            border-style: solid;
            border-width: 3px;
        }
    }

    .stepper-wrapper.active .step-selector i
    {
        color: var(--green-contrast);
    }



</style>


<div class="profit-loss-wrapper">

    <div class="table-wrapper">
        <div class="table-header">
            <div class="title"> 
               <h4>Profit & Loss</h4>
            </div>
            <div class="value">
                <p>$00.00</p>
            </div>
        </div>
        <div><p>My table and data content here</p></div>
    </div>

    <div class="stepper-wrapper">
        <div class="step-selector">
            <i class="fa-regular fa-square"></i>
        </div>
        <div class="step-line"></div>
    </div>

</div>


<script>
    feather.replace();

    $(document).ready(function() {
        $('.step-selector').on('click', function() {
            var $wrapper = $(this).closest('.stepper-wrapper');
            $wrapper.toggleClass('active');

            var $icon = $(this).find('i');
            if ($wrapper.hasClass('active')) {
                $icon.removeClass('fa-regular fa-square').addClass('fa-solid fa-square-check');
            } else {
                $icon.removeClass('fa-solid fa-square-check').addClass('fa-regular fa-square');
            }
        });
    });
</script>

</body>
