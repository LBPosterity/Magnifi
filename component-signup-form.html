<!DOCTYPE html>
<html lang="en">
  <title></title>
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
    @import url("styles.css");

    body 
    {
      background: var(--bg-light-green);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    .card 
    {
      background: var(--white);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      padding: 48px;
      width: 100%;
      max-width: 575px;
    }
 
    h1 
    {
      text-align: center;
      margin-bottom: 24px;
    }
 
    /* Account type radio --------------------- */
    .account-type 
    {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 24px;

      &:hover
      {
        border-color: var(--border-dark);
      }
    }
 
    .account-type label 
    {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 24px;
      cursor: pointer;
      position: relative;
    }
 
    .account-type label:first-child 
    {
      border-right: 1px solid var(--border);
    }
 
    .account-type input[type="radio"] 
    {
      display: none;
    }
 
    .radio-circle 
    {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    .radio-circle::after 
    {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: transparent;
    }
 


    /* checked state via sibling trick ---------------------- */

    .account-type input[type="radio"]:checked + .radio-circle 
    {
      border-color: var(--brand-green);
      background: var(--brand-green);
    }
 
    .account-type input[type="radio"]:checked + .radio-circle::after 
    {
      background: #ffffff;
    }



    /* Xero SSO button ------------------ */

    .xero-btn 
    {
      width: 100%;
      background: var(--brand-xero-light-bg);
      border: 1px solid transparent;
      border-radius: var(--radius-rounded);
      padding-block: 8px;
      color: var(--text);
      margin-bottom: 24px;

      &:hover
      {
        border-color: var(--border-dark);
      }
    }
 
    .xero-logo 
    {
      width: 32px;
      height: 32px;
    }
 

 
    /* Divider -------------------------- */

    .divider 
    {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      color: var(--text-light);
      font-weight: bold;
    }
 
    .divider::before, .divider::after 
    {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
 

    /* Form fields ---------------------- */

    .form-row 
    {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
 
    .field 
    {
      margin-bottom: 18px;
    }

    .field-row .input, .input 
    {
      width: 100%;
    }
 
    .hint 
    {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 6px;
    }
 


    /* Bottom row: captcha + button --------------- */

    .form-footer 
    {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-top: 32px;
    }
 


</style>

<body>




    
<div class="card">
  <h1>Create Account</h1>
 
  <!-- Account type selection -->
  <div class="account-type">
    <label>
      <input type="radio" name="account_type" value="business" checked>
      <span class="radio-circle"></span>
      <div>
        <p><strong>Business</strong></p>
        <p class="small">A paid account for business owners</p>
      </div>
    </label>
    <label>
      <input type="radio" name="account_type" value="advisor">
      <span class="radio-circle"></span>
      <div>
        <p><strong>Advisor</strong></p>
        <p class="small">A free account for financial advisors</p>
      </div>
    </label>
  </div>
 
  <!-- Xero SSO -->
  <button class="btn xero-btn" type="button">
    <img src="assets/xero-logo-mark.png" class="xero-logo">
    Use Xero Details
  </button>
 
  <div class="divider">OR</div>
 
  <!-- Manual sign-up form -->
  <form id="signup-form">
    <div class="form-row">
      <input type="text" name="first_name" placeholder="First Name" autocomplete="given-name" required class="input large">
      <input type="text" name="last_name" placeholder="Last Name" autocomplete="family-name" required class="input large">
    </div>
 
    <div class="field">
      <input type="email" name="email" placeholder="Email" autocomplete="email" required class="input large">
    </div>
 
    <div class="field">
      <input type="password" name="password" placeholder="Password" autocomplete="new-password" required minlength="8" class="input large">
      <p class="hint">Must be at least 8 characters</p>
    </div>
 
    <div class="field">
      <input type="text" name="organisation" placeholder="Organisation" autocomplete="organization" class="input large">
    </div>
 
    <div class="form-footer">
      <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>
      <button type="submit" class="btn large primary">Create Account</button>
    </div>
  </form>
</div>
 
<script>
  const form = document.getElementById('signup-form');
 
  form.addEventListener('submit', function(e) {
    e.preventDefault();
 
    if (typeof grecaptcha === 'undefined') {
      alert('Unable to verify CAPTCHA at this time. Please refresh the page and try again.');
      return;
    }
 
    const response = grecaptcha.getResponse();
    if (!response) {
      alert('Please complete the CAPTCHA.');
      return;
    }
 
    // All good — proceed with submission
    console.log('Form submitted', Object.fromEntries(new FormData(form)));
    alert('Account created successfully!');
  });
</script>







</body>
